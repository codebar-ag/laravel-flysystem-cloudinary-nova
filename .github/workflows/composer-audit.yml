name: Composer audit

on:
  push:
    paths:
      - 'composer.json'
      - 'composer.lock'
  pull_request:
    paths:
      - 'composer.json'
      - 'composer.lock'
  schedule:
    - cron: '0 6 * * 1'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Nova registry auth uses repo secrets; unavailable on pull requests from forks.
  composer-audit:
    if: ${{ github.repository == 'codebar-ag/laravel-flysystem-cloudinary-nova' && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.fork == false) }}
    name: composer audit
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6.0.2

      - name: Setup PHP
        uses: shivammathur/setup-php@2.37.0
        with:
          php-version: '8.5'
          coverage: none

      - name: Apply Nova license
        run: composer config http-basic.nova.laravel.com ${{ secrets.NOVA_USERNAME }} ${{ secrets.NOVA_LICENSE_KEY }}

      - name: Resolve dependencies and audit
        run: |
          composer update --no-interaction --no-ansi
          composer audit
